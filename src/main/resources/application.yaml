spring:
  application:
    name: ecommerce-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_CLIENT_ID}
            client-secret: ${OAUTH2_CLIENT_SECRET}

server:
  port: ${SERVER_PORT:8080}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  default-admin:
    email: ${DEFAULT_ADMIN_EMAIL:admin@ecommerce.com}
    password: ${DEFAULT_ADMIN_PASSWORD:Admin123!}
    nombre: ${DEFAULT_ADMIN_NAME:Administrador}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: ${SPRINGDOC_API_TITLE:Ecommerce API}
    description: ${SPRINGDOC_API_DESCRIPTION:API REST de e-commerce}
    version: ${SPRINGDOC_API_VERSION:0.0.1}
